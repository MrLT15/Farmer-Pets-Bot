name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - work

permissions:
  contents: read

jobs:
  test:
    name: Node.js ${{ matrix.node-version }} checks
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run syntax check
        run: npm run check

      - name: Run test suite
        run: npm test
